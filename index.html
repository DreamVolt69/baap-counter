<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friend Tap Counter</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#1f1c2c,#928dab);
color:white;
text-align:center;
margin:0;
padding:0;
}

h1{
margin-top:20px;
font-size:40px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:40px;
}

.card{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 8px 25px rgba(0,0,0,0.4);
}

.name{
font-size:24px;
margin-bottom:10px;
}

.count{
font-size:50px;
margin:10px 0;
}

button{
background:#ff4d6d;
border:none;
padding:12px 20px;
font-size:16px;
color:white;
border-radius:10px;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

.admin{
margin:30px;
}

input,select{
padding:10px;
border-radius:10px;
border:none;
margin:5px;
}

</style>
</head>

<body>

<h1>🔥 Baap Counter 🔥</h1>

<div class="container" id="friends"></div>

<div class="admin">

<h2>Admin Panel</h2>

<input type="password" id="adminPass" placeholder="Admin Password">

<select id="friendSelect">
<option value="0">Harsh Chakka</option>
<option value="1">Dev Bhadwa</option>
<option value="2">Kush Randhawa</option>
<option value="3">Omm Choti luli</option>
</select>

<input type="number" id="newValue" placeholder="New Value">

<button onclick="adminUpdate()">Update Counter</button>

</div>

<audio id="meme">
<source src="meme.mp3">
</audio>

<script>

const friends=[
"Harsh Chakka",
"Dev Bhadwa",
"Kush Randhawa",
"Omm Choti luli"
];

let counts=JSON.parse(localStorage.getItem("counts"))||[0,0,0,0];

const container=document.getElementById("friends");

function render(){

container.innerHTML="";

friends.forEach((name,i)=>{

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<div class="name">${name}</div>
<div class="count" id="count${i}">${counts[i]}</div>
<button onclick="tap(${i})">TAP</button>
`;

container.appendChild(card);

});

}

function tap(i){

counts[i]++;

localStorage.setItem("counts",JSON.stringify(counts));

document.getElementById("count"+i).innerText=counts[i];

document.getElementById("meme").play();

}

function adminUpdate(){

const pass=document.getElementById("adminPass").value;
const val=parseInt(document.getElementById("newValue").value);
const friend=parseInt(document.getElementById("friendSelect").value);

if(pass!=="admin123"){
alert("Wrong Password");
return;
}

counts[friend]=val;

localStorage.setItem("counts",JSON.stringify(counts));

render();

}

render();

</script>

</body>
</html>
